name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
      - name: Apply migrations
        run: python apps/api/migrate.py
      - name: Run tests
        run: python -m pytest apps/api/tests -q

  frontend-build:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install and build frontend
        working-directory: apps/web
        run: |
          npm install
          npm run build

  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/kudos-api:latest -f apps/api/Dockerfile apps/api
          docker push ghcr.io/${{ github.repository }}/kudos-api:latest
      - name: Build and push web image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/kudos-web:latest -f apps/web/Dockerfile apps/web
          docker push ghcr.io/${{ github.repository }}/kudos-web:latest

  e2e-tests:
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    services:
      web:
        image: ghcr.io/${{ github.repository }}/kudos-web:latest
        ports:
          - 3000:80
      api:
        image: ghcr.io/${{ github.repository }}/kudos-api:latest
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Playwright and run tests
        working-directory: apps/web
        run: |
          npm install
          npx playwright install --with-deps
          npm run test:e2e
