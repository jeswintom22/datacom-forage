version: '3.8'
services:
  api:
    build: ./apps/api
    ports:
      - '5000:5000'
    environment:
      - KUDOS_DB_PATH=/data/kudos.db
      - KUDOS_JWT_SECRET=dev-jwt-secret
    volumes:
      - ./apps/api:/app
      - ./data/api:/data
  web:
    build: ./apps/web
    ports:
      - '3000:80'
    depends_on:
      - api
    environment:
      - VITE_API_BASE_URL=http://api:5000/api
volumes:
  data:
    driver: local
